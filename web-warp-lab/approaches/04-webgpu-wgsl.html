<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>04 · WebGPU (WGSL) barrel — the literal desktop shader, in the browser</title>
<style>
  *{box-sizing:border-box}html,body{margin:0;height:100%;background:#000;color:#8fe;font:13px ui-monospace,monospace;overflow:hidden}
  .wrap{height:100%;display:grid;grid-template-rows:auto 1fr}
  .bar{display:flex;gap:14px;align-items:center;padding:9px 16px;background:#060d09;border-bottom:1px solid #0b3}
  .bar input{width:220px;accent-color:#36ff7e}#status{margin-left:auto;color:#36ff7e}
  .stage{display:grid;place-items:center;background:#000}
  .bezel{padding:14px;border-radius:24px;background:linear-gradient(#0b110d,#050805);box-shadow:0 0 0 2px #0a4,0 30px 90px #000,0 0 70px #0f03}
  canvas{display:block;border-radius:12px}
</style></head>
<body><div class="wrap">
  <div class="bar"><label>BARREL <input id="curv" type="range" min="0" max="100" value="44"></label>
    <span id="status">init…</span></div>
  <div class="stage"><div class="bezel">
    <canvas id="cap" width="960" height="600"></canvas>
    <canvas id="c" width="960" height="600" style="display:none"></canvas>
  </div></div>
</div>
<script type="module">
const status=document.getElementById('status');
const W=960,H=600;
// scene: terminal drawn to a 2D canvas (same content style as approach 03)
const scene=document.createElement('canvas');scene.width=W;scene.height=H;
const x=scene.getContext('2d');
const P='#36ff7e',D='#1f9f57',A='#f59e0b',C='#22d3ee';
const log=[['#9fe','TERMINAL · CURVED GLASS (WEB · WebGPU / WGSL)'],['',''],
 [P,'pbrown@web:~$ ',D,'cargo test'],['#7CFFA8','test result: ok. 53 passed; 0 failed'],['',''],
 [P,'pbrown@web:~$ ',D,'echo "this is the LITERAL crt_pass.wgsl barrel"'],
 [D,'this is the LITERAL crt_pass.wgsl barrel'],
 [P,'pbrown@web:~$ ',A,'claude ',D,'--resume'],[A,'▸ CLAUDE · ',D,'WGSL runs in Chrome via WebGPU, unmodified'],
 [P,'pbrown@web:~$ ',C,'seq 1 100000 | tail -1'],[D,'100000'],[P,'pbrown@web:~$ ']];
function drawScene(time){
  x.fillStyle='#021107';x.fillRect(0,0,W,H);
  const g=x.createRadialGradient(W/2,H*0.3,0,W/2,H*0.3,H*0.9);g.addColorStop(0,'rgba(10,60,25,.5)');g.addColorStop(1,'rgba(0,0,0,0)');
  x.fillStyle=g;x.fillRect(0,0,W,H);
  x.font='16px ui-monospace,monospace';x.textBaseline='top';x.shadowColor='#0f8';x.shadowBlur=6;
  let yy=20;for(const ln of log){let xx=22;for(let i=0;i<ln.length;i+=2){x.fillStyle=ln[i]||P;x.fillText(ln[i+1]||'',xx,yy);xx+=x.measureText(ln[i+1]||'').width;}yy+=22;}
  if(Math.floor(time/550)%2===0){const l=log[log.length-1];let cw=22;for(let i=1;i<l.length;i+=2)cw+=x.measureText(l[i]).width;x.shadowBlur=10;x.fillStyle=P;x.fillRect(cw,yy-22+2,9,16);}
  x.shadowBlur=0;
}
const WGSL=`
struct U { res: vec2f, k: vec2f };          // k.x=k1, k.y=k2  (matches crt_pass.wgsl)
@group(0) @binding(0) var samp: sampler;
@group(0) @binding(1) var tex: texture_2d<f32>;
@group(0) @binding(2) var<uniform> u: U;
@vertex fn vs(@builtin(vertex_index) i:u32) -> @builtin(position) vec4f {
  var p = array<vec2f,3>(vec2f(-1.,-1.), vec2f(3.,-1.), vec2f(-1.,3.));
  return vec4f(p[i],0.,1.);
}
fn warp(uv: vec2f) -> vec2f {
  let c = uv - 0.5; let r2 = dot(c,c);
  return 0.5 + c*(1.0 + u.k.x*r2 + u.k.y*r2*r2);   // l2 = 0.5 + c*(1 + k1 r2 + k2 r4)
}
@fragment fn fs(@builtin(position) pos: vec4f) -> @location(0) vec4f {
  let dim = vec2f(textureDimensions(tex, 0));          // resolution from the texture, not a uniform
  var uv = pos.xy / dim;
  let w = warp(uv);
  let e = min(w, vec2f(1.0)-w);
  let edge = smoothstep(0.0, 0.004, min(e.x,e.y));
  if (edge <= 0.0) { return vec4f(0.,0.,0.,1.); }
  let r2 = dot(w-0.5, w-0.5);
  let a = 0.004*r2;
  let cr = textureSampleLevel(tex, samp, warp(uv+vec2f(a,0.)), 0.0).r;
  let cg = textureSampleLevel(tex, samp, w, 0.0).g;
  let cb = textureSampleLevel(tex, samp, warp(uv-vec2f(a,0.)), 0.0).b;
  var col = vec3f(cr,cg,cb);
  col *= 1.0 - 0.14*(0.5+0.5*sin(w.y*dim.y*1.4));     // scanline
  col *= 1.0 - 0.5*r2;                                // vignette
  col *= edge;
  return vec4f(col, 1.0);
}`;
async function main(){
  if(!navigator.gpu){status.textContent='no WebGPU';return;}
  const adapter=await navigator.gpu.requestAdapter();
  if(!adapter){status.textContent='no adapter';return;}
  const device=await adapter.requestDevice();
  const ctx=document.getElementById('c').getContext('webgpu');
  const format=navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({device,format,alphaMode:'opaque'});
  const mod=device.createShaderModule({code:WGSL});
  const pipeline=device.createRenderPipeline({layout:'auto',
    vertex:{module:mod,entryPoint:'vs'},
    fragment:{module:mod,entryPoint:'fs',targets:[{format}]},
    primitive:{topology:'triangle-list'}});
  const tex=device.createTexture({size:[W,H],format:'rgba8unorm',
    usage:GPUTextureUsage.TEXTURE_BINDING|GPUTextureUsage.COPY_DST});
  const sampler=device.createSampler({magFilter:'linear',minFilter:'linear'});
  const ubuf=device.createBuffer({size:16,usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST});
  const bind=device.createBindGroup({layout:pipeline.getBindGroupLayout(0),
    entries:[{binding:0,resource:sampler},{binding:1,resource:tex.createView()},{binding:2,resource:{buffer:ubuf}}]});
  const curv=document.getElementById('curv');
  const t0=performance.now();

  // --- readback verification: render the warp into an offscreen texture, copy to a
  // buffer, and sample pixels. Headless can't screenshot the WebGPU swapchain, so this
  // PROVES the WGSL output is correct (centre lit, corners dark from the vignette). ---
  async function verify(){
    drawScene(0);
    const id0=x.getImageData(0,0,W,H);
    device.queue.writeTexture({texture:tex},new Uint8Array(id0.data.buffer),{bytesPerRow:W*4,rowsPerImage:H},[W,H]);
    device.queue.writeBuffer(ubuf,0,new Float32Array([W,H,0.44*3*0.14,0.44*3*0.06]));
    const out=device.createTexture({size:[W,H],format,usage:GPUTextureUsage.RENDER_ATTACHMENT|GPUTextureUsage.COPY_SRC});
    const rb=device.createBuffer({size:W*H*4,usage:GPUBufferUsage.COPY_DST|GPUBufferUsage.MAP_READ});
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({colorAttachments:[{view:out.createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    pass.setPipeline(pipeline);pass.setBindGroup(0,bind);pass.draw(3);pass.end();
    enc.copyTextureToBuffer({texture:out},{buffer:rb,bytesPerRow:W*4,rowsPerImage:H},[W,H]);
    device.queue.submit([enc.finish()]);
    await rb.mapAsync(GPUMapMode.READ);
    const px=new Uint8Array(rb.getMappedRange());
    const at=(cx,cy)=>{const i=(cy*W+cx)*4;return [px[i],px[i+1],px[i+2]];}; // note: may be BGRA
    const bgra=format.startsWith('bgra');
    const norm=c=>bgra?[c[2],c[1],c[0]]:c;
    let lit=0,sum=0;for(let i=0;i<px.length;i+=4){const v=px[i]+px[i+1]+px[i+2];sum+=v;if(v>20)lit++;}
    window.__rb={
      format, centre:norm(at(W>>1,H>>1)), corner:norm(at(8,8)),
      litFraction:+(lit/(W*H)).toFixed(3), avg:+(sum/(W*H*3)).toFixed(1)
    };
    // blit the verified WGSL output onto a 2D canvas so it's screenshot-capturable
    // (headless can't capture the WebGPU swapchain; real browsers present #c directly)
    const cap=document.getElementById('cap').getContext('2d');
    cap.putImageData(new ImageData(new Uint8ClampedArray(px.slice(0)),W,H),0,0);
    rb.unmap();
  }
  await verify().catch(e=>window.__rbErr=e.message);
  function frame(now){
    drawScene(now-t0);
    // upload via raw RGBA bytes (reliable headless; W*4=3840 is 256-aligned)
    const id=x.getImageData(0,0,W,H);
    device.queue.writeTexture({texture:tex},new Uint8Array(id.data.buffer),{bytesPerRow:W*4,rowsPerImage:H},[W,H]);
    const k=(+curv.value)/100*3.0;
    device.queue.writeBuffer(ubuf,0,new Float32Array([W,H,k*0.14,k*0.06]));
    const enc=device.createCommandEncoder();
    const pass=enc.beginRenderPass({colorAttachments:[{view:ctx.getCurrentTexture().createView(),clearValue:{r:0,g:0,b:0,a:1},loadOp:'clear',storeOp:'store'}]});
    pass.setPipeline(pipeline);pass.setBindGroup(0,bind);pass.draw(3);pass.end();
    device.queue.submit([enc.finish()]);
    status.textContent='WebGPU live · '+adapter.info?.vendor||'gpu';
    window.__ready=true;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
main().catch(e=>{status.textContent='ERR '+e.message;window.__err=e.message;});
</script></body></html>
