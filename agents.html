<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>terminal-delight — the agent wall</title>
<meta name="description" content="terminal-delight as mission control for a fleet of coding agents: a read-only console of themed cards — each agent's project, model, effort, what it's doing right now, live token spend, and whether it's blocked on you. Filter by program and state; click a card to watch.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='3' fill='%23021107'/><text y='12' x='2' font-size='11' fill='%2336ff7e'>▟</text></svg>">
<style>
  :root{
    --bg:#04100a; --bg2:#020806; --ink:#cfeede; --dim:#5f8f76; --dim2:#3f6354;
    --phos:#36ff7e; --phos-d:#1f9a52;
    --amber:#ffb13c; --red:#ff5d52; --cyan:#46d9e8; --violet:#c084fc; --pink:#ff7eb6;
    --line:#103b28; --row:#07140d;
    --glow:0 0 8px;
    --gi:0.62; --scan:0.5;
    --spill:rgba(54,255,126,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(130% 90% at 50% -8%, #0a1c12 0%, var(--bg) 52%, #010504 100%), var(--bg2);
    color:var(--ink); min-height:100%;
    font-family:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    -webkit-font-smoothing:antialiased; letter-spacing:.01em;
    display:flex; align-items:center; justify-content:center; padding:24px 22px 30px;
  }
  body::after{content:"";position:fixed;left:0;right:0;bottom:0;height:26%;pointer-events:none;z-index:0;
    background:linear-gradient(#0000,#08160e66 45%,#0a1c1299);
    -webkit-mask:linear-gradient(#0000,#000 70%);mask:linear-gradient(#0000,#000 70%);}

  /* ===== the console cabinet ===== */
  .console{ position:relative; width:min(98vw,1280px); z-index:1; }
  .cabinet{
    position:relative; border-radius:24px 24px 18px 18px; padding:18px 18px 14px;
    background:
      repeating-linear-gradient(90deg,#00000014 0 2px,#ffffff05 2px 4px,#00000010 4px 9px),
      linear-gradient(160deg,#22282a,#11181a 46%,#0a1012);
    box-shadow:0 2px 0 #ffffff14 inset, 0 -16px 38px #00000055 inset,
      0 46px 80px -28px #000c, 0 16px 36px #0009, 0 0 50px -8px var(--spill);
  }
  .cabinet::before{ content:""; position:absolute; inset:11px; border-radius:16px;
    box-shadow:0 0 0 2px #0007, 0 0 24px #0006 inset; pointer-events:none; }
  .screen-housing{ position:relative; border-radius:18px/16px; padding:12px;
    background:linear-gradient(150deg,#0c1110,#11181a);
    box-shadow:0 0 0 3px #0006, 0 8px 26px #000a inset, 0 2px 0 #ffffff10 inset; }
  .screen-housing::after{ content:""; position:absolute; inset:-6px; border-radius:22px/20px; pointer-events:none;
    box-shadow:0 0 46px 3px var(--spill) inset; mix-blend-mode:screen; }
  .screen{
    position:relative; border-radius:14px/13px; overflow:hidden;
    background:linear-gradient(#03130b,#020a07);
    box-shadow:0 0 0 5px #0a0b09, 0 0 70px #000a inset;
    padding:16px 18px 12px;
    height:80vh; min-height:560px; display:flex; flex-direction:column;
    filter:brightness(calc(.78 + var(--gi)*.5)) saturate(calc(.82 + var(--gi)*.4));
  }
  .screen::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:6;
    background:repeating-linear-gradient(0deg,#0000 0 2px,#00000028 2px 3px);
    mix-blend-mode:multiply; opacity:var(--scan); }
  .screen::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:7; border-radius:14px;
    box-shadow:0 0 130px 12px #000000aa inset, 0 0 46px 5px #16ff7e16 inset;
    background:radial-gradient(125% 92% at 50% 4%, #36ff7e12, #0000 52%); }
  .sheen{ position:absolute; inset:0; pointer-events:none; z-index:8; border-radius:14px;
    background:radial-gradient(150% 56% at 26% -4%, #ffffff12, #fff0 42%); mix-blend-mode:screen; }

  /* ---- header / rollup ---- */
  .top{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    padding-bottom:9px; border-bottom:1px solid var(--line); position:relative; z-index:4; }
  .eyebrow{ font-size:10.5px; letter-spacing:.32em; color:var(--dim); text-transform:uppercase; }
  .title{ font-size:17px; font-weight:800; letter-spacing:.16em; color:var(--phos);
    text-shadow:var(--glow) #36ff7e88; }
  .roll{ margin-left:auto; display:flex; gap:15px; align-items:baseline; font-size:12.5px; flex-wrap:wrap; }
  .pill{ display:inline-flex; gap:5px; align-items:baseline; }
  .pill b{ font-weight:800; }
  .c-work{ color:var(--phos); } .c-block{ color:var(--amber); }
  .c-err{ color:var(--red); } .c-done{ color:var(--phos-d); } .c-idle{ color:var(--dim); }
  .spend{ color:var(--ink); } .spend .k{ color:var(--dim); }

  .sub{ display:flex; gap:10px; align-items:center; font-size:11px; color:var(--dim);
    padding:7px 0 8px; position:relative; z-index:4; flex-wrap:wrap; }
  .sub .dot{ width:6px;height:6px;border-radius:50%;background:var(--phos);box-shadow:var(--glow) #36ff7e; animation:beat 1.6s infinite; }
  @keyframes beat{ 0%,100%{opacity:.35} 50%{opacity:1} }

  /* ---- filter chips: program + state, like the in-app wall ---- */
  .chiprow{ display:flex; gap:7px; flex-wrap:wrap; align-items:center; position:relative; z-index:4; padding:3px 0; }
  .chiprow + .chiprow{ padding-top:2px; }
  .chips-wrap{ border-bottom:1px solid var(--line); padding-bottom:9px; margin-bottom:3px; }
  .chip{ display:inline-flex; gap:7px; align-items:center; cursor:pointer; user-select:none;
    font-size:11.5px; padding:4px 11px; border-radius:999px;
    border:1px solid var(--line); background:#08160e; color:var(--dim);
    transition:background .18s,border-color .18s,color .18s,box-shadow .18s; }
  .chip:hover{ color:var(--ink); border-color:#1d6a44; }
  .chip .cdot{ width:8px;height:8px;border-radius:50%; box-shadow:0 0 6px currentColor; }
  .chip .cct{ color:var(--dim2); font-size:10.5px; }
  .chip.on{ color:#eafff2; border-color:var(--cc,#36ff7e);
    background:linear-gradient(#0d2417,#0a1b11); box-shadow:0 0 0 1px var(--cc,#36ff7e) inset, 0 0 12px -2px var(--cc,#36ff7e); }
  .chip.on .cct{ color:#9fd9bb; }

  /* ---- the wall: grouped card grid ---- */
  .wall{ flex:1; overflow:auto; position:relative; z-index:3; margin:0 -4px; padding:4px 4px 2px;
    scrollbar-width:thin; scrollbar-color:#1c5a3a #0000; }
  .wall::-webkit-scrollbar{ width:8px; } .wall::-webkit-scrollbar-thumb{ background:#1c5a3a; border-radius:8px; }

  .grp{ font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--dim2);
    padding:13px 6px 7px; display:flex; align-items:center; gap:8px; }
  .grp .bar{ width:10px;height:10px;border-radius:3px; box-shadow:var(--glow); }
  .grp .gnm{ color:#9fd9bb; }
  .grp .ct{ color:var(--dim2); margin-left:auto; letter-spacing:.1em; }

  .cardgrid{ display:grid; gap:13px; grid-template-columns:repeat(auto-fill,minmax(208px,1fr)); }

  /* ---- the card: a CCG-style portrait, mirroring the in-app wall ---- */
  .card{ position:relative; border-radius:13px; padding:3px; cursor:pointer;
    border:2px solid var(--gc); background:linear-gradient(150deg, color-mix(in srgb,var(--tc) 30%, #0a140e), #0a140e 60%, color-mix(in srgb,var(--tc) 14%, #060c08));
    box-shadow:0 14px 30px -18px #000d, 0 0 0 1px #0006;
    transition:transform .18s, box-shadow .25s, border-color .25s; }
  .card:hover{ transform:translateY(-3px); border-color:color-mix(in srgb,var(--gc) 70%, #fff 0%);
    box-shadow:0 22px 40px -18px #000e, 0 0 22px -6px var(--gc); }
  .card.working{ box-shadow:0 16px 32px -18px #000d, 0 0 20px -6px var(--gc); }
  .card.blocked{ border-color:#caa23a; } .card.error{ border-color:#d05a52; }
  .card.done{ opacity:.92; } .card.idle{ opacity:.8; }
  .cardface{ position:relative; border-radius:10px; border:1px solid color-mix(in srgb,var(--gc) 30%, #0000);
    background:linear-gradient(#0b150fdd, #07100bee); padding:8px 8px 7px; display:flex; flex-direction:column; gap:6px; }

  .cardtop{ display:flex; align-items:center; gap:6px; min-width:0; }
  .crest{ flex:none; font-size:9px; color:color-mix(in srgb,var(--gc) 70%,#cfeede); }
  .cname{ flex:1; min-width:0; font-size:10px; font-weight:800; color:var(--ink);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .kbadge{ flex:none; font-size:7.5px; font-weight:800; letter-spacing:.1em; padding:2px 5px; border-radius:4px;
    color:color-mix(in srgb,var(--gc) 80%,#fff); border:1px solid color-mix(in srgb,var(--gc) 45%,#0000); background:color-mix(in srgb,var(--gc) 12%,#0000); }
  .cwd{ font-size:7.5px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* art window: the logo portrait behind curved glass */
  .art{ position:relative; height:116px; border-radius:9px; overflow:hidden;
    border:2px solid color-mix(in srgb,var(--gc) 22%, #000);
    background:radial-gradient(120% 100% at 50% 34%, color-mix(in srgb,var(--tc) 16%, #03100a), #02100a 75%);
    box-shadow:0 0 0 1px #0008, 0 8px 18px #000a inset; }
  /* contain + center → every logo fully visible and centred in the frame, breathing room */
  .art img{ width:100%; height:100%; object-fit:contain; object-position:center center; padding:7px;
    filter:saturate(1.05) contrast(1.02); }
  .art::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:
      repeating-linear-gradient(0deg,#0000 0 2px,#00000026 2px 3px),
      radial-gradient(120% 90% at 50% 0%, #ffffff14, #0000 46%),
      radial-gradient(130% 120% at 50% 120%, #000a, #0000 55%);
    mix-blend-mode:soft-light; }
  .art .arttone{ position:absolute; inset:0; pointer-events:none; mix-blend-mode:overlay;
    background:radial-gradient(120% 100% at 50% 30%, color-mix(in srgb,var(--tc) 40%,#0000), #0000 70%); }
  .art.gen{ display:flex; align-items:center; justify-content:center;
    background:radial-gradient(120% 100% at 50% 25%, color-mix(in srgb,var(--tc) 34%, #0a140e), #060c08 72%); }
  .art.gen .mono{ font-size:34px; font-weight:800; letter-spacing:.04em; color:color-mix(in srgb,var(--gc) 55%, #cfeede); text-shadow:0 0 18px color-mix(in srgb,var(--gc) 60%,#0000); opacity:.92; }

  .statbar{ display:flex; gap:5px; flex-wrap:wrap; }
  .sbox{ font-size:7px; letter-spacing:.06em; padding:2px 5px; border-radius:4px; display:inline-flex; gap:4px; align-items:center;
    border:1px solid color-mix(in srgb,var(--gc) 30%,#0000); color:#9fc7b3; background:#0000; }
  .sbox b{ color:color-mix(in srgb,var(--gc) 85%,#fff); font-weight:800; }
  .sbox .lab{ color:var(--dim2); }

  .recap{ font-size:9px; line-height:1.45; color:#9fc7b3; min-height:34px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .recap .g{ color:var(--gc); margin-right:4px; }
  .recap .ger{ color:var(--dim); }
  .working .recap{ color:#bfe9d2; } .blocked .recap{ color:#ffd79a; } .error .recap{ color:#ffb0aa; }

  .cardbot{ display:flex; align-items:center; gap:8px; font-size:8px; color:var(--dim2); margin-top:1px; }
  .cardbot .d{ color:color-mix(in srgb,var(--gc) 80%,#cfeede); font-weight:700; }
  .cardbot .s{ color:var(--dim); }
  .pip{ margin-left:auto; display:inline-flex; gap:5px; align-items:center; font-size:8px; font-weight:800; letter-spacing:.05em;
    padding:2px 6px; border-radius:6px; border:1px solid; }
  .pip.working{ color:var(--phos); border-color:#1f6a40; background:#0c2417; box-shadow:0 0 10px -3px var(--phos); }
  .pip.blocked{ color:var(--amber); border-color:#5a3f12; background:#1c1404; }
  .pip.error{ color:var(--red); border-color:#5a1f1c; background:#1c0807; }
  .pip.done{ color:var(--phos-d); border-color:#16482e; background:#0a1b11; }
  .pip.idle{ color:var(--dim); border-color:#173a28; background:#08160e; }
  .pip.shell{ color:var(--dim); border-color:#173a28; background:#08160e; }
  .pip .pg{ animation:beat 1.1s infinite; }

  /* theme swatch badge on the middle-right frame edge (mirrors the in-app feature) */
  /* anchored to the MODEL-chip row (fixed offset = headers + art window), not the card centre */
  .tswatch{ position:absolute; top:156px; right:-1px; height:30px; display:flex; align-items:center; z-index:3; }
  .tswatch span{ width:19px; height:19px; border-radius:6px; display:flex; align-items:center; justify-content:center;
    font-size:11px; background:#0a140e; border:1px solid color-mix(in srgb,var(--tc) 55%, #0000);
    color:var(--tc); box-shadow:0 0 10px -3px var(--tc); }

  .empty{ color:var(--dim2); text-align:center; padding:46px 0; font-size:12px; }

  .foot{ display:flex; gap:14px; align-items:center; font-size:10.5px; color:var(--dim2);
    padding-top:9px; margin-top:5px; border-top:1px solid var(--line); position:relative; z-index:4; flex-wrap:wrap; }
  .foot a{ color:var(--phos-d); text-decoration:none; } .foot a:hover{ color:var(--phos); }
  .foot .right{ margin-left:auto; display:flex; gap:14px; }

  /* ===== bottom control dock ===== */
  .dock{ display:flex; align-items:center; gap:18px; padding:12px 12px 4px; position:relative; }
  .plate{ font-weight:800; letter-spacing:.14em; font-size:12px; color:#bfe9d2; text-shadow:0 1px 0 #0008; }
  .plate small{ display:block; font-weight:600; font-size:8.5px; letter-spacing:.26em; color:#5f8f76cc; margin-top:1px; }
  .led{ width:9px;height:9px;border-radius:50%; background:var(--phos); box-shadow:0 0 9px var(--phos),0 0 2px #fff inset; animation:beat 1.7s infinite; }
  .ledlab{ font-size:9px; letter-spacing:.2em; color:var(--dim); }
  .knobs{ margin-left:auto; display:flex; gap:20px; align-items:flex-start; }
  .knob-wrap{ display:flex; flex-direction:column; align-items:center; gap:3px; }
  .knob{ width:44px;height:44px;border-radius:50%; position:relative; cursor:ns-resize; touch-action:none;
    background:radial-gradient(circle at 38% 32%, #cfe9d6, #5f8f76 46%, #1c2c24 100%);
    box-shadow:0 4px 8px #000a, 0 0 0 4px #161e1b, 0 0 0 6px #0006, inset 0 -3px 6px #00000066, inset 0 2px 3px #ffffff55; }
  .knob::after{ content:""; position:absolute; left:50%; top:6px; width:3.5px; height:13px; margin-left:-1.75px;
    border-radius:2px; background:linear-gradient(#0d1512,#040806); box-shadow:0 0 2px #000; }
  .knob-label{ font-size:9px; letter-spacing:.13em; color:#bfe9d2; font-weight:700; }
  .knob-val{ font-size:8.5px; color:var(--phos-d); height:10px; }
  .stand{ position:relative; width:34%; max-width:240px; height:18px; margin:0 auto;
    background:linear-gradient(#161e1b,#0a1012); border-radius:0 0 10px 10px; box-shadow:0 14px 22px -8px #000a; }
  .stand::after{ content:""; position:absolute; left:50%; bottom:-9px; transform:translateX(-50%);
    width:48%; height:10px; border-radius:0 0 8px 8px; background:linear-gradient(#11181a,#070c0d); box-shadow:0 8px 14px #0009; }

  @media (max-width:760px){
    body{ padding:12px 10px 22px; }
    .screen{ height:auto; min-height:62vh; padding:13px 12px; }
    .cardgrid{ grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
    .roll{ width:100%; margin-left:0; }
    .dock{ flex-wrap:wrap; gap:12px; } .knobs{ margin-left:0; } .stand{ display:none; }
    .term{ width:94vw; height:80vh; }
  }

  /* ===== agent terminal modal — click a card to watch ===== */
  .modal{ position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; padding:28px;
    background:rgba(2,6,4,.72); backdrop-filter:blur(7px); -webkit-backdrop-filter:blur(7px); }
  .modal.open{ display:flex; animation:fade .18s ease; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .term{ position:relative; width:min(92vw,840px); height:min(80vh,620px); display:flex; flex-direction:column;
    border-radius:14px; overflow:hidden; background:linear-gradient(#03130b,#020a07);
    box-shadow:0 0 0 5px #0a0b09, 0 40px 90px -20px #000d, 0 0 70px #000a inset, 0 0 60px -10px var(--spill);
    animation:rise .22s cubic-bezier(.2,.8,.2,1); filter:brightness(calc(.82 + var(--gi)*.42)); }
  @keyframes rise{ from{transform:translateY(16px) scale(.985); opacity:.3} to{transform:none; opacity:1} }
  .term::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:6;
    background:repeating-linear-gradient(0deg,#0000 0 2px,#00000026 2px 3px); mix-blend-mode:multiply; opacity:var(--scan); }
  .term::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:7; border-radius:14px;
    box-shadow:0 0 120px 10px #000a inset, 0 0 40px 5px #16ff7e14 inset; }
  .thead{ display:flex; align-items:center; gap:9px; padding:9px 13px; position:relative; z-index:8;
    border-bottom:1px solid var(--line); background:#08160e; font-size:11.5px; }
  .thead .tdot{ width:9px;height:9px;border-radius:50%; box-shadow:0 0 7px currentColor; flex:none; }
  .thead .ttab{ color:var(--ink); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .thead .tmeta{ color:var(--dim); white-space:nowrap; }
  .thead .tstate{ margin-left:auto; font-weight:800; letter-spacing:.04em; flex:none; }
  .thead .tx{ cursor:pointer; color:var(--dim); padding:0 2px 0 6px; font-size:15px; flex:none; }
  .thead .tx:hover{ color:var(--phos); }
  .tbody{ flex:1; overflow:auto; padding:14px 16px 16px; position:relative; z-index:5;
    font-size:13px; line-height:1.62; white-space:pre-wrap; word-break:break-word; color:var(--ink);
    text-shadow:0 0 6px #16ff7e22; scrollbar-width:thin; scrollbar-color:#1c5a3a #0000; }
  .tbody::-webkit-scrollbar{ width:8px; } .tbody::-webkit-scrollbar-thumb{ background:#1c5a3a; border-radius:8px; }
  .t-h{ color:var(--phos); } .t-hp{ color:#eafff2; font-weight:600; }
  .t-b{ color:var(--phos-d); } .t-tool{ color:var(--cyan); font-weight:700; } .t-arg{ color:var(--dim); }
  .t-r{ color:#7fb79a; } .t-a{ color:var(--ink); } .t-mut{ color:var(--dim2); }
  .t-err{ color:var(--red); font-weight:700; } .t-done{ color:var(--phos); font-weight:700; }
  .t-blk{ color:var(--amber); font-weight:700; } .t-opt{ color:var(--ink); } .t-optc{ color:var(--phos); }
  .cur{ display:inline-block; width:.62em; height:1.05em; vertical-align:text-bottom; background:var(--phos);
    box-shadow:0 0 7px var(--phos); animation:blink 1.05s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0} }

  /* ===== program-flavoured watch modal (Claude warm · Codex cyan) ===== */
  .thead .tkind{ font-weight:800; letter-spacing:.1em; font-size:10px; flex:none; }
  .t-cx{ color:var(--cyan); } .t-cmd{ color:#bfe9d2; } .t-cxc{ color:var(--cyan); font-weight:700; }
  .term.k-codex .t-h{ color:var(--cyan); } .term.k-codex .tbody{ text-shadow:0 0 6px #29e3ed22; }
  .term.k-claude .t-b{ color:#e0934e; } .term.k-claude .t-a{ color:#f1e7de; }
  .term.k-claude .t-s{ color:#e0934e; } .term.k-claude .t-h{ color:#e0934e; }
  .term.k-claude .tbody{ text-shadow:0 0 6px #e0934e1f; }

  /* ===== </> savings pill + the LeanCTX savings panel (mirrors the in-app plugin) ===== */
  .sv{ cursor:pointer; border:1px solid var(--phos-d); color:var(--phos); background:#0c2417;
    border-radius:8px; padding:3px 9px; font-weight:700; box-shadow:0 0 10px -3px var(--phos); transition:.15s; }
  .sv:hover{ border-color:var(--phos); box-shadow:0 0 14px -2px var(--phos); }
  .svpanel{ position:relative; width:min(92vw,820px); max-height:84vh; overflow:auto; border-radius:14px;
    background:linear-gradient(#071a10,#04120b); border:1px solid var(--line);
    box-shadow:0 0 0 5px #0a0b09, 0 40px 90px -20px #000d, 0 0 60px -10px var(--spill);
    padding:20px 22px; font-size:13px; animation:rise .22s cubic-bezier(.2,.8,.2,1);
    scrollbar-width:thin; scrollbar-color:#1c5a3a #0000; }
  .svpanel::-webkit-scrollbar{ width:8px; } .svpanel::-webkit-scrollbar-thumb{ background:#1c5a3a; border-radius:8px; }
  .sv-h{ display:flex; align-items:center; gap:10px; padding-bottom:13px; border-bottom:1px solid var(--line); }
  .sv-logo{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:15px; color:var(--ink); }
  .sv-logo .lb{ background:#0c2417; border:1px solid var(--phos-d); border-radius:7px; padding:2px 7px; color:var(--phos); font-size:12px; }
  .sv-logo .lc{ color:var(--cyan); }
  .sv-h .sub2{ color:var(--dim); font-size:11px; }

<script>
// ---- projects (tab groups) → frame colour, theme tint+glyph, logo art ----
// theme tint/glyph mirror TD's per-pane Dynamic colour-sets + swatch glyph.
const GROUPS = {
  'terminal-delight':{c:'#36ff7e', tc:'#67F454', glyph:'❖', art:'assets/cards/terminal-delight.png'},
  'aurora-api':      {c:'#46d9e8', tc:'#29E3ED', glyph:'⚡', art:'assets/cards/imt-outbound.png'},
  'storefront-web':  {c:'#ffb13c', tc:'#E5AA0D', glyph:'☼', art:'assets/cards/hc-video.png'},
  'ml-pipeline':     {c:'#c084fc', tc:'#916D86', glyph:'🌙', art:'assets/cards/imt-defense.png'},
  'docs-site':       {c:'#ff7eb6', tc:'#ff7eb6', glyph:'🍒', art:'assets/cards/apes.png'},
  'infra':           {c:'#9fe06a', tc:'#44B064', glyph:'🪵', art:'assets/cards/imt-backroad.png'},
  'workstation':     {c:'#3f6354', tc:'#5A6061', glyph:'○', art:null},
};
const GERUNDS = ['Reading files','Editing','Running tests','Searching','Reasoning','Compiling','Reviewing the diff','Thinking'];

// ---- the fleet: a FICTIONAL snapshot — staged demo data only (no real prompts/paths).
// The terminal-delight rows reference its own already-public, shipped features.
// state: working|idle|blocked|error|done|shell · eff 0..1 · sess Σ · kind claude|codex|shell
let A = [
  {g:'terminal-delight', tab:'render-hotpath', kind:'codex',  model:'gpt-5.5', eff:.85, state:'working', prompt:'Hoisting the grade coefficients out of the per-cell styled_lines loop', t:24, tok:126,  sess:2200},
  {g:'terminal-delight', tab:'agents-kiosk',   kind:'claude', model:'opus-4.8', eff:.85, state:'working', prompt:'Rebuilding the live agent-wall kiosk as themed cards with real portrait art', t:11, tok:393,  sess:773},
  {g:'terminal-delight', tab:'i18n-coverage',  kind:'claude', model:'opus-4.8', eff:1.0, state:'done',    prompt:'Localize the entire UI into nine languages, compiler-checked', t:0, tok:0, sess:24100},
  {g:'terminal-delight', tab:'crt-webgl',      kind:'claude', model:'sonnet-4.6', eff:.55, state:'working', prompt:'Investigating retro-term WebGL CRT effects for the focus tube', t:33, tok:1800, sess:1800},
  {g:'terminal-delight', tab:'focus-reader',   kind:'claude', model:'opus-4.8', eff:.85, state:'done',    prompt:'Wrap-to-fit reader with warp-aware select, no side jiggle', t:0, tok:0, sess:6900},

  {g:'aurora-api', tab:'cold-start',   kind:'claude', model:'opus-4.8', eff:.85, state:'working', prompt:'Profiling the cold-start path and caching the slow startup query', t:64, tok:1600, sess:1600},
  {g:'aurora-api', tab:'auth-tests',   kind:'claude', model:'opus-4.8', eff:1.0, state:'blocked', prompt:'Add integration tests for the auth middleware — needs your review of the fixtures', t:0, tok:0, sess:4100},
  {g:'aurora-api', tab:'upload-retry', kind:'codex',  model:'gpt-5.5', eff:.85, state:'error',   prompt:'Add retry with exponential backoff to the upload client', t:0, tok:1800, sess:1800},
  {g:'aurora-api', tab:'flaky-ci',     kind:'claude', model:'sonnet-4.6', eff:.55, state:'idle', prompt:'Triage the flaky CI tests and quarantine the worst offenders', t:0, tok:0, sess:0},

  {g:'storefront-web', tab:'checkout-flow', kind:'claude', model:'opus-4.8', eff:.85, state:'working', prompt:'Refactoring the checkout flow into smaller, testable components', t:47, tok:690, sess:2400},
  {g:'storefront-web', tab:'api-v2-docs',   kind:'claude', model:'opus-4.8', eff:.85, state:'done',    prompt:'Draft the API reference for the v2 endpoints', t:0, tok:0, sess:3000},
  {g:'storefront-web', tab:'onboarding',    kind:'codex',  model:'gpt-5.5', eff:.55, state:'idle',    prompt:'Polish the first-run onboarding copy', t:0, tok:0, sess:0},

  {g:'ml-pipeline', tab:'feature-bench', kind:'claude', model:'sonnet-4.6', eff:.55, state:'working', prompt:'Benchmarking the feature-extraction stage on large batches', t:19, tok:540, sess:1100},
  {g:'ml-pipeline', tab:'eval-harness',  kind:'claude', model:'opus-4.8', eff:.85, state:'blocked', prompt:'Wire the eval harness to the new scorer — confirm the rubric before I run it', t:0, tok:0, sess:5200},

  {g:'infra', tab:'dep-bump', kind:'claude', model:'opus-4.8', eff:.85, state:'done', prompt:'Bump dependencies and fix the breaking changes', t:0, tok:0, sess:5500},
  {g:'docs-site', tab:'static-gen', kind:'codex', model:'gpt-5.5', eff:.30, state:'idle', prompt:'Migrate the docs to the new static-site generator', t:0, tok:0, sess:0},

  {g:'workstation', tab:'build-watch', kind:'shell', model:null, eff:0, state:'shell', prompt:'cargo watch -x build', t:0, tok:0, sess:0},
  {g:'workstation', tab:'dev-shell',   kind:'shell', model:null, eff:0, state:'shell', prompt:'~/code', t:0, tok:0, sess:0},
];
A.forEach((a,i)=>a._id=i);

const STATE = { working:{glyph:'▶'}, idle:{glyph:'○'}, blocked:{glyph:'‖'}, error:{glyph:'✕'}, done:{glyph:'✓'}, shell:{glyph:'·'} };
const effWord = e => e>=.95?'max':e>=.8?'high':e>=.5?'medium':e>0?'low':'';
const mmss = s => (s>=60? Math.floor(s/60)+'m '+String(s%60).padStart(2,'0')+'s' : s+'s');
const ktok = n => n>=1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(n);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const wall = document.getElementById('wall');
const roll = document.getElementById('roll');
const progEl = document.getElementById('progchips');
const stateEl = document.getElementById('statechips');
let gerundPhase = 0;
let fProg = 'all';
let fState = 'all';

function groupOrder(){ const o=[],s={}; for(const a of A){ if(!s[a.g]){s[a.g]=1;o.push(a.g);} } return o; }
function visible(a){
  if(fProg!=='all' && a.kind!==fProg) return false;
  if(fState!=='all'){ if(fState==='idle' && a.state==='shell') return true; if(a.state!==fState) return false; }
  return true;
}

function renderChips(){
  const cnt = k => A.filter(a=>a.kind===k).length;
  const progs = [['all','ANY PROGRAM','#cfeede',A.length],['claude','CLAUDE','#ffb13c',cnt('claude')],['codex','CODEX','#46d9e8',cnt('codex')],['shell','SHELL','#3f6354',cnt('shell')]];
  progEl.innerHTML = progs.map(([k,lab,col,ct])=>`<div class="chip ${fProg===k?'on':''}" data-p="${k}" style="--cc:${col}"><span class="cdot" style="background:${col}"></span>${lab}<span class="cct">${ct}</span></div>`).join('');
  const sc = s => A.filter(a=>a.state===s).length;
  const states = [['all','ANY STATE','#cfeede',A.length],['working','WORKING','#36ff7e',sc('working')],['blocked','BLOCKED','#ffb13c',sc('blocked')],['error','ERROR','#ff5d52',sc('error')],['done','DONE','#1f9a52',sc('done')],['idle','IDLE','#5f8f76',sc('idle')+sc('shell')]];
  stateEl.innerHTML = states.map(([k,lab,col,ct])=>`<div class="chip ${fState===k?'on':''}" data-s="${k}" style="--cc:${col}"><span class="cdot" style="background:${col}"></span>${lab}<span class="cct">${ct}</span></div>`).join('');
  progEl.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{fProg=c.dataset.p;render();});
  stateEl.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{fState=c.dataset.s;render();});
}

function cardHTML(a){
  const G = GROUPS[a.g]||GROUPS.workstation;
  const shell = a.state==='shell';
  const pipTxt = {working:'working',blocked:'on you ⏎',error:'error',done:'done',idle:'idle',shell:'shell'}[a.state];
  const art = G.art
    ? `<div class="art"><img src="${G.art}" alt="" loading="lazy"><div class="arttone"></div></div>`
    : `<div class="art gen"><span class="mono">${esc(a.tab.slice(0,2).toUpperCase())}</span><div class="arttone"></div></div>`;
  const model = shell ? `<span class="sbox"><span class="lab">SERVICE</span> <b>SHELL</b></span>`
    : `<span class="sbox"><span class="lab">MODEL</span> <b>${esc((a.model||'').toUpperCase())}</b></span>`
      + (a.state==='working'?`<span class="sbox"><span class="lab">EFFORT</span> <b>${effWord(a.eff).toUpperCase()}</b></span>`:'');
  const ger = a.state==='working' ? `<span class="ger">${GERUNDS[(gerundPhase+a.t)%GERUNDS.length]}… </span>` : '';
  const recap = shell ? `<span class="g">$</span>${esc(a.prompt)}` : `<span class="g">›</span>${ger}${esc(a.prompt)}`;
  const dT = (a.state==='working' && a.tok) ? `<span class="d">Δ${ktok(a.tok)}</span>` : `<span class="d">Δ0</span>`;
  const sS = a.sess ? `<span class="s">Σ${ktok(a.sess)}</span>` : `<span class="s">Σ0</span>`;
  const pg = a.state==='working'?'<span class="pg">▶</span>':(a.state==='done'?'✓':(a.state==='blocked'?'⏸':(a.state==='error'?'⚠':(shell?'·':'○'))));
  const kind = (a.kind||'shell').toUpperCase();
  return `<div class="card ${a.state}" data-idx="${a._id}" style="--gc:${G.c}; --tc:${G.tc}">
    <div class="cardface">
      <div class="cardtop"><span class="crest">◇</span><span class="cname">${esc(a.tab)}</span><span class="kbadge">${kind}</span></div>
      <div class="cwd">${esc(a.g)}/</div>
      ${art}
      <div class="statbar">${model}</div>
      <div class="recap">${recap}</div>
      <div class="cardbot">${dT}${sS}<span class="pip ${a.state}">${pg} ${pipTxt}</span></div>
    </div>
    <div class="tswatch"><span>${G.glyph}</span></div>
  </div>`;
}

function render(){
  renderChips();
  const order = groupOrder();
  let html = '';
  let shown = 0;
  for(const g of order){
    const G = GROUPS[g]||GROUPS.workstation;
    const items = A.filter(a=>a.g===g && visible(a));
    if(!items.length) continue;
    const live = items.filter(a=>a.state==='working').length;
    html += `<div class="grp"><span class="bar" style="background:${G.c};box-shadow:0 0 8px ${G.c}"></span><span class="gnm">${esc(g)}</span><span class="ct">${items.length} pane${items.length>1?'s':''}${live?` · ${live} live`:''}</span></div>`;
    html += `<div class="cardgrid">` + items.map(cardHTML).join('') + `</div>`;
    shown += items.length;
  }
  wall.innerHTML = shown ? html : `<div class="empty">no panes match this filter</div>`;

  const n = s => A.filter(a=>a.state===s).length;
  const dTok = A.filter(a=>a.state==='working').reduce((s,a)=>s+a.tok,0);
  const sTok = A.reduce((s,a)=>s+a.sess,0);
  roll.innerHTML =
      `<span class="pill c-work">▶ <b>${n('working')}</b></span><span class="pill c-block">‖ <b>${n('blocked')}</b></span>`
    + `<span class="pill c-err">✕ <b>${n('error')}</b></span><span class="pill c-done">✓ <b>${n('done')}</b></span>`
    + `<span class="pill c-idle">○ <b>${n('idle')}</b></span>`
    + `<span class="pill spend"><span class="k">Δ</span> ${ktok(dTok)}</span><span class="pill spend"><span class="k">Σ</span> ${ktok(sTok)}</span>`
    + `<span class="pill sv" id="sv-btn" title="lean-ctx token savings — click">&lt;/&gt; savings</span>`;
  const svb=document.getElementById('sv-btn'); if(svb) svb.onclick=openSavings;
  document.getElementById('npanes').textContent = A.filter(a=>a.state!=='shell').length;
}

// ---- live simulation ----
function tick(){
  for(const a of A){ if(a.state==='working'){ a.t+=1; a.tok+=Math.round(20+Math.random()*180); a.sess+=Math.round(8+Math.random()*40); } }
  gerundPhase=(gerundPhase+1)%GERUNDS.length;
  render();
  if(openId!=null && A[openId] && A[openId].state==='working') refreshModal();
}
function churn(){
  const live=A.filter(a=>a.state!=='shell'), working=live.filter(a=>a.state==='working');
  if(working.length<5){ const cand=live.filter(a=>a.state!=='working'); const a=cand[Math.floor(Math.random()*cand.length)];
    if(a){ a.state='working'; a.t=0; a.tok=Math.round(40+Math.random()*120); } }
  else { const a=working[Math.floor(Math.random()*working.length)]; const r=Math.random();
    a.sess+=a.tok; a.tok=0; a.t=0; a.state=r<0.55?'done':r<0.82?'blocked':'idle'; }
  render(); if(openId!=null) refreshModal();
}

// ---- knobs ----
const K={glow:0.62,scan:0.5};
function bindKnob(el,vEl,name,apply){
  const set=v=>{ K[name]=Math.max(0,Math.min(1,v)); el.style.transform='rotate('+(K[name]*270-135)+'deg)';
    if(vEl)vEl.textContent=Math.round(K[name]*100)+'%'; apply(K[name]); };
  set(K[name]); let drag=false,sy,sv;
  el.addEventListener('pointerdown',e=>{drag=true;sy=e.clientY;sv=K[name];el.setPointerCapture(e.pointerId);e.preventDefault();});
  el.addEventListener('pointermove',e=>{if(drag)set(sv+(sy-e.clientY)/150);});
  el.addEventListener('pointerup',()=>drag=false); el.addEventListener('pointercancel',()=>drag=false);
  el.addEventListener('wheel',e=>{e.preventDefault();set(K[name]-Math.sign(e.deltaY)*0.06);},{passive:false});
}
const rs=document.documentElement.style;
bindKnob(document.getElementById('k-glow'),document.getElementById('v-glow'),'glow',v=>{ rs.setProperty('--gi',v.toFixed(3)); rs.setProperty('--spill',`rgba(54,255,126,${(0.07+v*0.18).toFixed(3)})`); });
bindKnob(document.getElementById('k-scan'),document.getElementById('v-scan'),'scan',v=>{ rs.setProperty('--scan',(v*0.85).toFixed(3)); });

// ---- click a card → watch that agent (terminal facsimile) ----
const STACK = {
  'terminal-delight':{p:'~/code/terminal-delight', dir:'app/src', read:'app/src/pane.rs', edit:'app/src/pane.rs', test:'cargo test', sh:'demo@td'},
  'aurora-api':      {p:'~/code/aurora-api', dir:'src', read:'src/startup.rs', edit:'src/startup.rs', test:'cargo test', sh:'demo@aurora'},
  'storefront-web':  {p:'~/code/storefront-web', dir:'src', read:'src/checkout/Cart.tsx', edit:'src/checkout/steps.ts', test:'npm test', sh:'demo@web'},
  'ml-pipeline':     {p:'~/code/ml-pipeline', dir:'pipeline', read:'pipeline/features.py', edit:'pipeline/features.py', test:'pytest -q', sh:'demo@ml'},
  'docs-site':       {p:'~/code/docs-site', dir:'docs', read:'docs/guide.md', edit:'astro.config.mjs', test:'npm run build', sh:'demo@docs'},
  'infra':           {p:'~/code/infra', dir:'.', read:'Cargo.toml', edit:'Cargo.lock', test:'cargo build', sh:'demo@infra'},
  'workstation':     {p:'~/code', dir:'.', read:'', edit:'', test:'', sh:'dev@workstation'},
};
const CUR='<span class="cur"></span>';

// Claude Code look: ❯ prompt · ● bullets · Tool(args) + ⎿ result · ✻ Cogitating · 1/2/3 perms.
function claudeTx(a,s){
  const L=[], bul=t=>`<span class="t-b">●</span> <span class="t-a">${esc(t)}</span>`,
    tl=(t,arg)=>`<span class="t-b">●</span> <span class="t-tool">${t}</span>(<span class="t-arg">${esc(arg)}</span>)`,
    rs=r=>`<span class="t-r">  ⎿ ${esc(r)}</span>`;
  L.push(`<span class="t-h">❯</span> <span class="t-hp">${esc(a.prompt)}</span>`,'');
  L.push(bul(`I'll start in ${s.dir}/ and work through it.`));
  L.push(tl('Read',s.read), rs(`Read ${120+(a._id*37)%360} lines`));
  L.push(tl('Search',`pattern: "${esc(a.tab.split(/[-·]/)[0])}", path: "${s.dir}"`), rs(`Found ${2+a._id%7} matches`));
  if(a.state==='working'){
    L.push(tl('Edit',s.edit), rs(`Updated with ${2+a._id%5} additions and ${a._id%4} removals`),'');
    L.push(`<span class="t-s">✻ ${GERUNDS[(gerundPhase+a.t)%GERUNDS.length]}… (${mmss(a.t)} · ↓ ${ktok(a.tok)} tokens · esc to interrupt)</span> ${CUR}`);
  } else if(a.state==='blocked'){
    L.push(bul(`I've drafted the change — this needs your review before I apply it:`), tl('Edit',s.edit),'');
    L.push(`<span class="t-a">Do you want to make this edit to <b>${esc(s.edit)}</b>?</span>`,`<span class="t-optc">❯ 1.</span> <span class="t-opt">Yes</span>`,`  <span class="t-opt">2. Yes, and don't ask again this session</span>`,`  <span class="t-opt">3. No, tell Claude what to do differently</span>`,'');
    L.push(`<span class="t-blk">⏸ blocked — waiting for your response</span> ${CUR}`);
  } else if(a.state==='error'){
    L.push(tl('Bash',s.test),'',`<span class="t-err">✗ API Error (429): rate_limit_exceeded — too many requests.</span>`,`<span class="t-mut">  Retrying in 38s… (attempt 2/5)</span> ${CUR}`);
  } else if(a.state==='done'){
    L.push(tl('Edit',s.edit), rs(`+${6+a._id%30} −${a._id%9}`), tl('Bash',s.test), rs(`${8+a._id%20} passed; 0 failed`));
    L.push(bul(`Done — ${a.prompt.charAt(0).toLowerCase()+a.prompt.slice(1)}. All green.`),'',`<span class="t-done">✓ Done · Σ${ktok(a.sess)} tokens · ${4+a._id%9} tool uses</span>`,`<span class="t-h">${s.sh} ${s.p} $</span> ${CUR}`);
  } else { L.push('',`<span class="t-mut">(queued — no turn running yet)</span>`,`<span class="t-h">${s.sh} ${s.p} $</span> ${CUR}`); }
  return L.join('\n');
}
// Codex CLI look: › turn · • thought · $ exec + → result · • Working · y/a/n approval · cyan.
function codexTx(a,s){
  const L=[], exec=(cmd,out)=>`<span class="t-cx">$</span> <span class="t-cmd">${esc(cmd)}</span>\n<span class="t-r">  → ${esc(out)}</span>`;
  L.push(`<span class="t-cx">›</span> <span class="t-hp">${esc(a.prompt)}</span>`,'');
  L.push(`<span class="t-mut">• thought for ${1+a._id%4}s</span>`);
  L.push(exec(`grep -rn "${esc(a.tab.split(/[-·]/)[0])}" ${s.dir}`, `${2+a._id%7} matches · ${1+a._id%3} files`));
  L.push(exec(`sed -n '1,40p' ${s.read}`, `read ${40+(a._id*13)%120} lines`));
  if(a.state==='working'){
    L.push(exec(`apply_patch ${s.edit}`, `patched ${s.edit}`),'');
    L.push(`<span class="t-cx">• Working</span> <span class="t-mut">(${mmss(a.t)} · ↓ ${ktok(a.tok)} tokens · esc to interrupt)</span> ${CUR}`);
  } else if(a.state==='blocked'){
    L.push(`<span class="t-a">Allow Codex to run <b>${esc(s.test)}</b>?</span>`,`<span class="t-cxc">› y</span> <span class="t-opt">yes (once)</span>`,`  <span class="t-opt">a  yes, and don't ask again this session</span>`,`  <span class="t-opt">n  no, tell Codex what to change</span>`,'');
    L.push(`<span class="t-blk">⏸ waiting for approval</span> ${CUR}`);
  } else if(a.state==='error'){
    L.push(exec(s.test,'…'),'',`<span class="t-err">✗ stream error: 429 rate_limit_exceeded</span>`,`<span class="t-mut">  retrying (2/5)…</span> ${CUR}`);
  } else if(a.state==='done'){
    L.push(exec(`apply_patch ${s.edit}`, `+${6+a._id%30} −${a._id%9}`), exec(s.test, `${8+a._id%20} passed; 0 failed`));
    L.push(`<span class="t-cx">•</span> <span class="t-a">Done — ${esc(a.prompt.charAt(0).toLowerCase()+a.prompt.slice(1))}.</span>`,'',`<span class="t-done" style="color:var(--cyan)">✓ completed · Σ${ktok(a.sess)} tokens</span>`,`<span class="t-cx">${s.sh}:~$</span> ${CUR}`);
  } else { L.push('',`<span class="t-mut">(idle — no task running)</span>`,`<span class="t-cx">${s.sh}:~$</span> ${CUR}`); }
  return L.join('\n');
}
function transcriptFor(a){
  const s=STACK[a.g]||STACK.workstation;
  if(a.state==='shell'){
    return [`<span class="t-h">${s.sh} ${esc(a.prompt)} $</span> cargo watch -x build`,`<span class="t-mut">    Finished dev [unoptimized + debuginfo] in 4.2s</span>`,`<span class="t-h">${s.sh} ${s.p} $</span> ${CUR}`].join('\n');
  }
  return a.kind==='codex' ? codexTx(a,s) : claudeTx(a,s);
}

const modal=document.getElementById('modal'), thead=document.getElementById('thead'), tbody=document.getElementById('tbody');
let openId=null;
function openModal(a){
  openId=a._id;
  const kind=a.kind||'shell';
  const kcol=kind==='claude'?'#ffb13c':kind==='codex'?'#46d9e8':'#5f8f76';
  document.getElementById('term').className='term'+(kind==='codex'?' k-codex':kind==='claude'?' k-claude':'');
  const stCls={working:'c-work',blocked:'c-block',error:'c-err',done:'c-done',idle:'c-idle',shell:'c-idle'}[a.state];
  const stTxt={working:'working',blocked:'blocked on you',error:'error',done:'done',idle:'idle',shell:'shell'}[a.state];
  thead.innerHTML=`<span class="tdot" style="background:${kcol};color:${kcol}"></span>`
    +`<span class="tkind" style="color:${kcol}">${kind.toUpperCase()}</span>`
    +`<span class="ttab">${esc(a.g)} › ${esc(a.tab)}</span>`
    +`<span class="tmeta">· ${a.model?esc(a.model)+' · '+effWord(a.eff):'shell'}</span><span class="tstate ${stCls}">${stTxt}</span><span class="tx" id="tx" title="close (Esc)">✕</span>`;
  tbody.innerHTML=transcriptFor(a);
  document.getElementById('tx').onclick=closeModal; modal.classList.add('open'); tbody.scrollTop=tbody.scrollHeight;
}
function closeModal(){ openId=null; modal.classList.remove('open'); }
function refreshModal(){ if(openId!=null && A[openId]) openModal(A[openId]); }
wall.addEventListener('click', e=>{ const c=e.target.closest('.card'); if(c) openModal(A[+c.dataset.idx]); });
modal.addEventListener('click', e=>{ if(e.target===modal) closeModal(); });
// ---- the </> LeanCTX savings panel — mirrors the in-app plugin, ties to leanctx.com ----
const svmodal=document.getElementById('svmodal'), svpanel=document.getElementById('svpanel');
function svm(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':String(Math.round(n)); }
function buildSavings(){
  const agents=A.filter(a=>a.state!=='shell');
  const rows=agents.slice(0,7).map(a=>{
    const hex=(0x100000+(a._id*81773)%0x900000).toString(16);
    return { id:'mcp-'+hex+'-'+(a.kind==='codex'?'cdx':'cc')+(a._id%9),
      kind:a.kind==='codex'?'codex-cli':'claude-code', calls:3+(a._id*7)%150,
      saved:Math.round(a.sess*9 + 22000 + (a._id*8123)%980000) };
  });
  const total=82e6 + agents.reduce((s,a)=>s+a.sess,0)*55;
  const usd=Math.round(total/400000);
  const files=[['app/src/main.rs',11.8e6,98],['agents.html',5.2e6,97],['app/src/pane.rs',3.3e6,92],['docs/features/01-agentic-mcp.md',1.2e6,88],['app/src/theme.rs',1.0e6,86]];
  svpanel.innerHTML =
      `<div class="sv-h"><div class="sv-logo"><span class="lb">&lt;/&gt;</span> Lean<span class="lc">CTX</span> <span class="sub2">token savings</span></div>`
    + `<span class="sv-badge">★ 73 · Lv4 Guardian</span></div>`
    + `<div class="sv-stats">`
    + `<div class="sv-stat"><div class="v g">${svm(total)}</div><div class="l">tokens saved</div></div>`
    + `<div class="sv-stat"><div class="v c">85%</div><div class="l">compression</div></div>`
    + `<div class="sv-stat"><div class="v w">$${usd}</div><div class="l">USD saved</div></div></div>`
    + `<div class="sv-secn">across 188 agents (per-agent = estimated):</div>`
    + rows.map(r=>`<div class="sv-row"><span class="id">${r.id}</span><span class="kk">${r.kind}</span><span class="ca">${r.calls} calls</span><span class="s2">≈ ${svm(r.saved)}</span></div>`).join('')
    + `<div class="sv-secn">top files by compression:</div>`
    + files.map(f=>`<div class="sv-file"><span class="fn">${f[0]}</span><span class="fm">${svm(f[1])}</span><span class="fp">${f[2]}%</span></div>`).join('')
    + `<div class="sv-foot">context saved by <a href="https://leanctx.com/" target="_blank" rel="noopener">lean-ctx</a> (compression on lean-ctx-touched traffic, not your full provider bill) · per-agent = estimated until lean-ctx stamps <code>agent_id</code> into the savings ledger.<br>esc or click outside to close · <a href="https://leanctx.com/" target="_blank" rel="noopener">leanctx.com →</a></div>`;
}
function openSavings(){ buildSavings(); svmodal.classList.add('open'); }
function closeSavings(){ svmodal.classList.remove('open'); }
svmodal.addEventListener('click', e=>{ if(e.target===svmodal) closeSavings(); });

addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeModal(); closeSavings(); } });

render();
setInterval(tick,1000); setInterval(churn,5000);
window.__ready=true;
</script></body></html>
