name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Prepare patched gpui (td-crt-pass + sever-gpl)
        run: ../scripts/prepare-gpui.sh

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - name: Format
        run: cargo fmt -- --check

      - name: Check
        run: cargo check --locked

      - name: Clippy
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Release build smoke
        run: cargo build --release --locked

  js:
    name: Browser prototype checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check ES modules
        run: |
          node --check src/js/main.js
          node --check src/js/workspace.js
          node --check src/js/panes.js
          node --check src/js/popout.js
          node --check src/js/detach.js
          node --check src/js/theme-engine.js

  supply-chain:
    name: Supply-chain checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Prepare patched gpui (td-crt-pass + sever-gpl)
        run: ../scripts/prepare-gpui.sh
      - uses: taiki-e/install-action@cargo-audit
      - uses: taiki-e/install-action@cargo-deny
      - name: Audit advisories
        run: cargo audit
      - name: Check licenses and sources
        run: cargo deny check

  package:
    name: AppImage (artifact)
    # Build the distributable MIT-clean AppImage on pushes to main and tags,
    # not on every PR. Non-blocking signal; downloadable from the run's artifacts.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare patched gpui (td-crt-pass + sever-gpl)
        run: ./scripts/prepare-gpui.sh

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app

      - uses: taiki-e/install-action@cargo-about

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: terminal-delight-x86_64.AppImage
          path: dist/terminal-delight-x86_64.AppImage
          if-no-files-found: error
