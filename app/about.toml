# cargo-about config — generates the THIRD-PARTY-LICENSES bundle shipped inside
# release binaries (see scripts/build-appimage.sh). The accepted set mirrors the
# permissive allowlist in app/deny.toml; for the handful of OR-licensed crates
# (e.g. self_cell = "Apache-2.0 OR GPL-2.0-only") cargo-about elects the
# permissive arm — exactly as cargo-deny does — so the bundle carries no copyleft.
#
# Scoped to the Linux binary target so the bundle reflects what actually ships
# (no Windows/macOS/wasm-only crates, no build/dev-only deps).
accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "bzip2-1.0.6",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "NCSA",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]

targets = ["x86_64-unknown-linux-gnu"]
ignore-build-dependencies = true
ignore-dev-dependencies = true
filter-noassertion = true
