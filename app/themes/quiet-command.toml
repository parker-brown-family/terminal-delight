# terminal-delight theme — quiet-command (calm light, effects off)
name = "quiet-command"
icon = "☀"

[colors]
bg      = "#f3f6f9"
surface = "#ffffff"
text    = "#101828"
accent  = "#2f6fdd"
faint   = "#d9e1ea"
cursor  = "#2f6fdd"
ansi = [
  "#101828", "#dc2626", "#16a34a", "#d97706",
  "#2f6fdd", "#9333ea", "#0891b2", "#667085",
  "#98a2b3", "#ef4444", "#22c55e", "#f59e0b",
  "#3b82f6", "#a855f7", "#06b6d4", "#101828",
]

[effects]
scanline_opacity = 0.0
scanline_step    = 3.0
vignette         = 0.0
glow             = 0.0

bloom            = 0.0
tracking         = 0.0
tracking_period  = 16.0
tracking_sweep   = 7.0
flicker          = 0.0
curvature        = 0.0     # barrel warp (needs td-crt-pass renderer patch)
jiggle           = 0.0

[font]
family      = "JetBrains Mono"
size        = 14.0
cell_height = 20.0
