# terminal-delight theme — hacker (phosphor green CRT)
# Edit this file while the app is running: it hot-reloads. No recompile.
name = "hacker"

[colors]
bg      = "#03100a"
surface = "#071a10"
text    = "#86efac"
accent  = "#22c55e"
faint   = "#14401f"
cursor  = "#4ade80"
# ANSI 16, tinted to the phosphor identity
ansi = [
  "#0a0f0a", "#ff4444", "#22c55e", "#f5c542",
  "#3b82f6", "#c45ab3", "#67e8f9", "#86efac",
  "#14401f", "#ff7b7b", "#4ade80", "#fbe08a",
  "#7aa5ff", "#e08ad4", "#a5f3fc", "#ecfff4",
]

[effects]
scanline_opacity = 0.22   # 0 = off
scanline_step    = 4.0     # px between scanlines
vignette         = 0.8    # top/bottom CRT falloff, 0 = off
glow             = 0.85    # accent glow strength (header, cursor), 0 = off

bloom            = 0.9     # center phosphor bloom
tracking         = 0.6     # rolling tracking band strength
tracking_period  = 8.0     # seconds between sweeps
flicker          = 0.5     # stepped CRT flicker
jiggle           = 0.7     # rare 1-2px vertical-hold hop

[font]
family      = "JetBrains Mono"
size        = 14.0
cell_height = 20.0
