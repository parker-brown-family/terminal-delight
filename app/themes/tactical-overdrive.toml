# terminal-delight theme — tactical-overdrive (high-contrast cyan command deck)
# Palette trued-up to IMT campaign-manager: tactical base 5/11/14% lightness,
# companion-hue borders (5baecd band), warm #ff9b45 signals.
name = "tactical-overdrive"
icon = "★"

[colors]
bg      = "#061015"
surface = "#101f26"
text    = "#eefaff"
accent  = "#31d7ff"
faint   = "#1b3947"
cursor  = "#7df2ff"
ansi = [
  "#0a1018", "#ff5050", "#39d98a", "#ff9b45",
  "#31d7ff", "#b78aff", "#67e8f9", "#dff6ff",
  "#1d4663", "#ff8484", "#6ee7b7", "#ffb36f",
  "#91f6ff", "#d0b3ff", "#a5f3fc", "#f2fbff",
]

# TEXTURE: high-tech command HQ — holographic shine but ULTIMATELY CLEAN. Bright
# glow + bloom and a crisp raised bezel give the glassy/holographic edge; the
# noisy CRT tells (flicker/jiggle/roll) are dialled right down so it reads as a
# sophisticated, futuristic, *clean* surface rather than a grungy tube.
[effects]
scanline_opacity = 0.028
scanline_step    = 3.0
vignette         = 0.18
glow             = 0.78
bloom            = 0.55
tracking         = 0.08
tracking_period  = 26.0
tracking_sweep   = 5.0
flicker          = 0.05
jiggle           = 0.04
bezel            = 0.98    # crisp raised metallic/holographic frame

[font]
family      = "JetBrains Mono"
size        = 14.0
cell_height = 20.0
